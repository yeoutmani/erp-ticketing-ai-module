networks:
  erp_network:
    external: true
  traefik_public:
    external: true

services:
  frontend:
    image: ghcr.io/yeoutmani/erp-ticketing-ai-module/frontend:main
    build:
      context: ..
      dockerfile: infra/frontend/Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    expose:
      - "3000"
    networks:
      - erp_network
      - traefik_public
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik_public"
      - "traefik.http.routers.erp.rule=Host(`${ERP_DOMAIN}`)"
      - "traefik.http.routers.erp.entrypoints=websecure"
      - "traefik.http.routers.erp.tls.certresolver=cloudflare"
      - "traefik.http.routers.erp.priority=1"
      - "traefik.http.services.erp.loadbalancer.server.port=3000"

  automation:
    image: ghcr.io/yeoutmani/erp-ticketing-ai-module/automation:main
    build:
      context: ..
      dockerfile: infra/automation/Dockerfile
    environment:
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      AI_TIMEOUT_MS: ${AI_TIMEOUT_MS:-30000}
      AI_CONFIDENCE_THRESHOLD: ${AI_CONFIDENCE_THRESHOLD:-0.75}
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3}
    depends_on: [ollama]
    expose:
      - "3000"
    networks:
      - erp_network
      - traefik_public
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik_public"
      - "traefik.http.routers.erp-api.rule=Host(`${ERP_DOMAIN}`) && PathPrefix(`/api/`)"
      - "traefik.http.routers.erp-api.entrypoints=websecure"
      - "traefik.http.routers.erp-api.tls.certresolver=cloudflare"
      - "traefik.http.routers.erp-api.priority=10"
      - "traefik.http.services.erp-api.loadbalancer.server.port=3000"

  n8n:
    image: n8nio/n8n:latest
    environment:
      N8N_PORT: ${N8N_PORT:-5678}
      N8N_HOST: "0.0.0.0"
      N8N_BASIC_AUTH_ACTIVE: ${N8N_BASIC_AUTH_ACTIVE}
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_BLOCK_ENV_ACCESS_IN_NODE: ${N8N_BLOCK_ENV_ACCESS_IN_NODE:-false}
      N8N_PATH: ${N8N_PATH:-/n8n/}
      WEBHOOK_URL: ${WEBHOOK_URL}           # ← no nested default, set explicitly in .env
      AUTOMATION_URL: http://automation:3000
    volumes:
      - n8n_data:/home/node/.n8n
    expose:
      - "5678"
    networks:
      - erp_network
      - traefik_public
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik_public"
      - "traefik.http.routers.erp-n8n.rule=Host(`${ERP_DOMAIN}`) && PathPrefix(`/n8n/`)"
      - "traefik.http.routers.erp-n8n.entrypoints=websecure"
      - "traefik.http.routers.erp-n8n.tls.certresolver=cloudflare"
      - "traefik.http.routers.erp-n8n.priority=10"
      - "traefik.http.services.erp-n8n.loadbalancer.server.port=5678"

  ollama:
    build: ./ollama
    volumes:
      - ollama_models:/root/.ollama
    networks:
      - erp_network          # ← internal only, removed from traefik_public
    restart: unless-stopped

volumes:
  n8n_data:
  ollama_models: