name: Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  migrate:
    name: Supabase migrations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} --workdir supabase
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Run migrations
        id: migrations
        continue-on-error: true
        run: supabase db push --linked --workdir supabase
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Warn if migrations failed
        if: steps.migrations.outcome == 'failure'
        run: |
          echo "Migrations failed but deploy continues."
          echo "Check Supabase dashboard manually."

  build:
    name: Build & push Docker images
    runs-on: ubuntu-latest
    needs: migrate
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/frontend/Dockerfile
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/erp-ticketing-ai-module/frontend:main
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push automation
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/automation/Dockerfile
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/erp-ticketing-ai-module/automation:main
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Create deploy directory
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: mkdir -p ${{ secrets.VPS_DEPLOY_PATH }}

      - name: Copy infra files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          source: "infra/docker-compose.yml,infra/ollama,infra/n8n,infra/scripts"
          target: ${{ secrets.VPS_DEPLOY_PATH }}
          strip_components: 1

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            cd ${{ secrets.VPS_DEPLOY_PATH }}

            cat > .env << EOF
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            SUPABASE_URL=${{ secrets.SUPABASE_URL }}
            SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
            SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
            N8N_PORT=5678
            N8N_HOST=0.0.0.0
            N8N_BASIC_AUTH_ACTIVE=true
            N8N_BASIC_AUTH_USER=${{ secrets.N8N_BASIC_AUTH_USER }}
            N8N_BASIC_AUTH_PASSWORD=${{ secrets.N8N_BASIC_AUTH_PASSWORD }}
            N8N_ENCRYPTION_KEY=${{ secrets.N8N_ENCRYPTION_KEY }}
            N8N_BLOCK_ENV_ACCESS_IN_NODE=false
            N8N_PATH=/n8n/
            WEBHOOK_URL=https://${{ secrets.ERP_DOMAIN }}/n8n/
            AI_TIMEOUT_MS=${{ secrets.AI_TIMEOUT_MS }}
            AI_CONFIDENCE_THRESHOLD=${{ secrets.AI_CONFIDENCE_THRESHOLD }}
            OLLAMA_BASE_URL=http://ollama:11434
            OLLAMA_CHAT_MODEL=${{ secrets.OLLAMA_CHAT_MODEL }}
            OLLAMA_EMBED_MODEL=${{ secrets.OLLAMA_EMBED_MODEL }}
            ERP_DOMAIN=${{ secrets.ERP_DOMAIN }}
            IMAGE_PREFIX=ghcr.io/${{ github.repository_owner }}
            EOF

            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io \
              -u ${{ github.actor }} --password-stdin

            # Pull registry images
            docker compose pull frontend automation

            # Build ollama locally (not in registry)
            docker compose build ollama

            # Start everything
            docker compose up -d --no-build

            echo "Waiting for services..."
            sleep 15

            if docker compose ps n8n | grep -q "running"; then
              bash scripts/seed-n8n.sh
            else
              echo "n8n not running, skipping seed"
            fi

            docker image prune -f